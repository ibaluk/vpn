services:
  vpn-site:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vpn-site
    ports:
      - "8080:80"
    restart: unless-stopped

  wordpress:
    image: wordpress:6.8-php8.3-apache
    container_name: freecity-wordpress
    depends_on:
      - wordpress-db
    environment:
      WORDPRESS_DB_HOST: wordpress-db:3306
      WORDPRESS_DB_USER: wp_user
      WORDPRESS_DB_PASSWORD: wp_password
      WORDPRESS_DB_NAME: wp_freecity
    ports:
      - "8081:80"
    volumes:
      - wordpress_data:/var/www/html
    restart: unless-stopped

  wordpress-db:
    image: mysql:8.0
    container_name: freecity-wordpress-db
    environment:
      MYSQL_DATABASE: wp_freecity
      MYSQL_USER: wp_user
      MYSQL_PASSWORD: wp_password
      MYSQL_ROOT_PASSWORD: root_password
    command: --default-authentication-plugin=mysql_native_password
    volumes:
      - wordpress_db_data:/var/lib/mysql
    restart: unless-stopped

volumes:
  wordpress_data:
  wordpress_db_data:
